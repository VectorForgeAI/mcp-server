version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      patch-and-minor:
        update-types: [patch, minor]
    labels: [dependencies]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, github-actions]
    commit-message:
      prefix: "chore(actions)"
